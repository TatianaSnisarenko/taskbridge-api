services:
  db:
    image: postgres:16-alpine
    container_name: teamup-postgres
    environment:
      POSTGRES_DB: teamup
      POSTGRES_USER: teamup
      POSTGRES_PASSWORD: teamup
    ports:
      - '5432:5432'
    volumes:
      - teamup_pgdata:/var/lib/postgresql/data
  api:
    image: node:20-alpine
    container_name: teamup-api
    working_dir: /app
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run dev"
volumes:
  teamup_pgdata:
  api_node_modules:
